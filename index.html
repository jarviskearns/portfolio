<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>jarvis kearns graphics homepage</title>
  <style>
    @font-face {
      font-family: "Jarvis Graphics Typeface";
      src:
        url("./fonts/LoRes21OTSerif-Regular.woff2") format("woff2"),
        url("./fonts/LoRes21OTSerif-Regular.woff") format("woff");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    :root {
      --background: #ffffff;
      --text: #000000;
      --link: #0000ee;
      --hover-background: #0000ee;
      --hover-text: #ffffff;
      --line: #111111;
      --work-divider-x: 294px;
      --font: "OCR A Std", "OCR A Extended", "OCR-A", "Letter Gothic Std", "Share Tech Mono", "IBM Plex Mono", "Cascadia Mono", "Andale Mono", "Monaco", "Lucida Console", "DejaVu Sans Mono", "Noto Sans Mono", ui-monospace, monospace;
      --mobile-side-padding: 16px;
      --mobile-ascii-side-padding: 28px;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--background);
      color: var(--text);
      font-family: var(--font);
      font-variant-ligatures: none;
      text-rendering: geometricPrecision;
      font-synthesis: none;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      overflow-x: auto;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 30;
      border: 1px solid var(--line);
      pointer-events: none;
    }

    .site-screen-lines {
      position: fixed;
      inset: 0;
      z-index: 18;
      pointer-events: none;
    }

    .site-screen-line {
      position: fixed;
      display: block;
      background: var(--line);
      pointer-events: none;
    }

    .site-screen-line.is-work-divider {
      left: var(--work-divider-x);
      top: 0;
      bottom: 0;
      width: 1px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    main {
      min-height: 100vh;
      display: block;
      padding: 48px 32px 48px 310px;
    }

    .site-banner {
      display: block;
      width: 100%;
      font-family: "Jarvis Graphics Typeface", "OCR A Std", "OCR A Extended", "OCR-A", "Letter Gothic Std", "Share Tech Mono", "IBM Plex Mono", "Cascadia Mono", "Andale Mono", "Monaco", "Lucida Console", "DejaVu Sans Mono", "Noto Sans Mono", ui-monospace, monospace;
      font-size: clamp(24px, 4vw, 56px);
      font-weight: normal;
      letter-spacing: -0.06em;
      line-height: 1;
      margin: 0;
      padding: 0 0 12px 0;
      border-bottom: 1px solid var(--line);
      color: var(--text);
    }

    .work-scroll {
      position: fixed;
      left: 32px;
      top: 48px;
      bottom: 48px;
      width: 250px;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      background: var(--background);
      border-right: 1px solid var(--line);
    }

    .work-scroll::-webkit-scrollbar {
      display: none;
    }

    .work-track {
      display: flex;
      flex-direction: column;
      gap: 18px;
      will-change: scroll-position;
    }

    .work-set {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .work-track img {
      display: block;
      width: 100%;
      max-height: 280px;
      height: auto;
      object-fit: contain;
      cursor: zoom-in;
    }

    .image-lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
    }

    .image-lightbox.is-open {
      display: flex;
    }

    .image-lightbox-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: min(92vw, 1100px);
      max-height: 92vh;
    }

    .image-lightbox img {
      display: block;
      max-width: 100%;
      max-height: calc(92vh - 64px);
      width: auto;
      height: auto;
      object-fit: contain;
      background: transparent;
    }

    .image-lightbox-link {
      margin-top: 14px;
      color: var(--link);
      font: inherit;
      font-size: clamp(14px, 1.5vw, 20px);
      line-height: 1.1;
      text-align: center;
    }

    .image-lightbox-link:hover,
    .image-lightbox-link:focus-visible {
      background: var(--hover-background);
      color: var(--hover-text);
      outline: none;
    }

    .image-lightbox-close {
      position: absolute;
      top: 18px;
      right: 22px;
      border: 0;
      padding: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
    }

    .organic-ascii {
      width: min(80vw, 980px);
      max-width: 100%;
      margin: 10vh 0 0 0;
      overflow: hidden;
      background: transparent;
      color: var(--text);
      font-family: var(--font);
      font-size: clamp(9px, 1.1vw, 15px);
      line-height: 1.05;
      letter-spacing: 0.015em;
    }

    .ascii-layer {
      margin: 0;
      font: inherit;
      line-height: inherit;
      letter-spacing: inherit;
      white-space: pre;
      user-select: text;
    }

    .ascii-layer a {
      color: var(--link);
      background: transparent;
      font: inherit;
      line-height: inherit;
      letter-spacing: inherit;
      text-decoration: none;
      user-select: auto;
      border: 0;
    }

    .utility-link {
      letter-spacing: 0.08em;
    }

    .ascii-layer a:hover,
    .ascii-layer a:focus-visible,
    .ascii-layer a.is-active {
      background: var(--hover-background);
      color: var(--hover-text);
      outline: none;
      text-decoration: none;
    }

    .ascii-layer .char-highlight {
      background: #ffe600;
      color: #000000;
    }

    .ascii-fallback {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.35em;
      width: 100%;
      padding-top: 0.5em;
      font: inherit;
      line-height: 1.05;
      letter-spacing: 0.03em;
    }

    .ascii-fallback .fallback-label {
      color: var(--text);
      font-size: clamp(14px, 2vw, 24px);
      line-height: 1;
      margin-bottom: 0.2em;
    }

    .ascii-fallback .fallback-project {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.05em;
      margin: 0 0 0.45em 0;
    }

    .ascii-fallback a {
      color: var(--link);
      background: transparent;
      font: inherit;
      font-size: clamp(17px, 2.4vw, 31px);
      line-height: 1.03;
      text-decoration: none;
    }

    .ascii-fallback a:hover,
    .ascii-fallback a:focus-visible,
    .ascii-fallback a.is-active {
      background: var(--hover-background);
      color: var(--hover-text);
      outline: none;
      text-decoration: none;
    }

    @media (max-width: 900px) {
      body {
        overflow-x: hidden;
      }

      .site-screen-line.is-work-divider {
        display: none;
      }

      main {
        width: 100%;
        min-height: 100svh;
        padding: 178px var(--mobile-side-padding) 32px var(--mobile-side-padding);
        overflow-x: hidden;
      }

      .site-banner {
        max-width: 100%;
        font-size: clamp(20px, 8vw, 36px);
        line-height: 0.94;
        letter-spacing: -0.075em;
      }

      .site-banner {
        display: block;
        width: 100%;
        white-space: nowrap;
      }


      .site-banner {
        padding-left: 0;
        padding-right: 0;
      }


      .work-scroll {
        position: fixed;
        left: 0;
        top: 0;
        right: 0;
        bottom: auto;
        z-index: 2;
        width: 100%;
        height: 140px;
        padding: 18px 12px 12px 12px;
        overflow-x: auto;
        overflow-y: hidden;
        background: var(--background);
        border-right: 0;
        border-bottom: 1px solid var(--line);
        touch-action: pan-x;
      }

      .work-track,
      .work-set {
        flex-direction: row;
        width: max-content;
        gap: 14px;
        align-items: center;
      }

      .work-track img {
        flex: 0 0 auto;
        width: auto;
        height: 104px;
        max-height: 104px;
        object-fit: contain;
      }

      .image-lightbox {
        padding: 20px;
        touch-action: none;
      }

      .image-lightbox img {
        max-height: calc(92vh - 72px);
      }

      .image-lightbox-close {
        top: 12px;
        right: 16px;
        font-size: 26px;
      }

      .organic-ascii {
        width: 100%;
        margin-top: 8vh;
        font-size: clamp(8.6px, 3.35vw, 14px);
        line-height: 1.02;
        letter-spacing: 0.045em;
      }



    }

    @media (max-width: 520px) {
      main {
        padding: 158px var(--mobile-side-padding) 28px var(--mobile-side-padding);
      }

      .work-scroll {
        height: 122px;
        padding: 14px 8px 10px 8px;
      }

      .work-track,
      .work-set {
        gap: 10px;
      }

      .work-track img {
        height: 92px;
        max-height: 92px;
      }

      .site-banner {
        font-size: clamp(18px, 8.7vw, 32px);
      }

      .organic-ascii {
        margin-top: 6vh;
        font-size: clamp(4.8px, 1.33vw, 6.7px);
        line-height: 1;
      }
    }

    @media (max-width: 380px) {
      .organic-ascii {
        font-size: 4.55px;
      }
    }
  </style>
</head>

  <script>
    // --- Infinite image rail ---
    (function () {
      const scroller = document.querySelector('.work-scroll');
      const track = document.querySelector('.work-track');

      if (!scroller || !track) return;

      // Keep only the first visible copy from the HTML.
      // The script rebuilds the rail as: hidden copy / real copy / hidden copy.
      const sourceImages = Array.from(track.querySelectorAll('img:not([aria-hidden="true"])'));

      if (sourceImages.length === 0) return;

      const imageLightbox = document.getElementById('imageLightbox');
      const lightboxImage = imageLightbox ? imageLightbox.querySelector('img') : null;
      const lightboxLink = imageLightbox ? imageLightbox.querySelector('.image-lightbox-link') : null;
      const lightboxClose = imageLightbox ? imageLightbox.querySelector('.image-lightbox-close') : null;

      const projectLinksByPrefix = [
        {
          prefix: '202605',
          href: 'https://jarviskearns.github.io/musica-obscura/',
          label: 'Musica Obscura'
        },
        {
          prefix: 'commons',
          href: 'https://jarviskearns.github.io/web-collage/',
          label: 'semantic web collager'
        },
        {
          prefix: 'Screenshot',
          href: 'https://jarviskearns.github.io/Balance-of-power-Videogame-propaganda-archive/',
          label: 'Balance of Power archive'
        }
      ];

      function getImageFilename(image) {
        const src = image.getAttribute('src') || '';
        return decodeURIComponent(src.split('/').pop() || '');
      }

      function getProjectLinkForImage(image) {
        const filename = getImageFilename(image);
        return projectLinksByPrefix.find((project) => filename.startsWith(project.prefix)) || null;
      }

      function openImageLightbox(image) {
        if (!imageLightbox || !lightboxImage || !lightboxLink) return;

        const project = getProjectLinkForImage(image);

        lightboxImage.src = image.currentSrc || image.src;
        lightboxImage.alt = image.alt || '';
        lightboxLink.href = project ? project.href : '#';
        lightboxLink.textContent = project ? project.label : '';
        lightboxLink.style.display = project ? '' : 'none';

        imageLightbox.classList.add('is-open');
        imageLightbox.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';

          'n', 'o', 'p', 'q', 'r', 's', 't', 'u', 'v', 'w', 'x', 'y', 'z',
          'I', 'J', 'K', 'L', 'M',
          '±', '×', '÷', '°', '§', '†', '‡', '«', '»', '¡', '¿',
          '¢', '£', '¥', '©', '®', '™', '¬',
        ];

        function wrapTextNode(textNode) {
          const text = textNode.data;
          if (!text) return;
          const frag = document.createDocumentFragment();
          for (const ch of text) {
            if (ch === ' ' || ch === '\n') {
              frag.appendChild(document.createTextNode(ch));
            } else {
              const span = document.createElement('span');
              span.dataset.char = ch;
              span.dataset.original = ch;
              span.textContent = ch;
              frag.appendChild(span);
            }
          }
          textNode.parentNode.replaceChild(frag, textNode);
        }

        function walkAndWrap(node) {
          if (node.nodeType === Node.TEXT_NODE) { wrapTextNode(node); return; }
          Array.from(node.childNodes).forEach(walkAndWrap);
        }

        walkAndWrap(pre);

        let hoveredOriginal = null;
        let cyclingInterval = null;
        const revertTimers = {};
        const tickers = [];

        function pickReplacement() {
          const usedChars = new Set(Array.from(pre.querySelectorAll('[data-char]')).map(el => el.dataset.char));
          const available = REPLACEMENTS.filter(c => !usedChars.has(c));
          if (available.length === 0) return null;
          return available[Math.floor(Math.random() * available.length)];
        }

        function applyChar(originalChar, displayChar) {
          const spans = pre.querySelectorAll(`[data-original="${CSS.escape(originalChar)}"]`);
          spans.forEach(el => { el.dataset.char = displayChar; el.textContent = displayChar; });
          pre.querySelectorAll('.char-highlight').forEach(el => el.classList.remove('char-highlight'));
          pre.querySelectorAll(`[data-char="${CSS.escape(displayChar)}"]`).forEach(el => el.classList.add('char-highlight'));
        }

        function startCycling(originalChar) {
          clearTimeout(revertTimers[originalChar]);
          delete revertTimers[originalChar];
          function doSwap() { const next = pickReplacement(); if (next) applyChar(originalChar, next); }
          doSwap();
          cyclingInterval = setInterval(doSwap, 80);
        }

        function stopCycling(originalChar) {
          clearInterval(cyclingInterval);
          cyclingInterval = null;
          const REVERT_STEPS = 4;
          const REVERT_INTERVAL = 60;
          let step = 0;
          revertTimers[originalChar] = setTimeout(() => {
            const ticker = setInterval(() => {
              step++;
              if (step >= REVERT_STEPS) {
                clearInterval(ticker);
                const idx = tickers.indexOf(ticker);
                if (idx > -1) tickers.splice(idx, 1);
                const spans = pre.querySelectorAll(`[data-original="${CSS.escape(originalChar)}"]`);
                spans.forEach(el => { el.dataset.char = el.dataset.original; el.textContent = el.dataset.original; });
                delete revertTimers[originalChar];
                if (hoveredOriginal === null) { pre.querySelectorAll('.char-highlight').forEach(el => el.classList.remove('char-highlight')); }
              } else { const next = pickReplacement(); if (next) applyChar(originalChar, next); }
            }, REVERT_INTERVAL);
            tickers.push(ticker);
          }, 50);
        }

        const onMouseOver = (e) => {
          const span = e.target.closest('[data-original]');
          const insideLink = span && span.closest('a');
          const original = insideLink ? span.dataset.original : null;
          if (original === hoveredOriginal) return;
          if (hoveredOriginal !== null) stopCycling(hoveredOriginal);
          pre.querySelectorAll('.char-highlight').forEach(el => el.classList.remove('char-highlight'));
          hoveredOriginal = original;
          if (original) startCycling(original);
        };

        const onMouseLeave = () => {
          if (hoveredOriginal !== null) stopCycling(hoveredOriginal);
          hoveredOriginal = null;
          pre.querySelectorAll('.char-highlight').forEach(el => el.classList.remove('char-highlight'));
        };

        pre.addEventListener('mouseover', onMouseOver);
        pre.addEventListener('mouseleave', onMouseLeave);

        cleanupCycling = () => {
          clearInterval(cyclingInterval);
          Object.keys(revertTimers).forEach(key => clearTimeout(revertTimers[key]));
          tickers.forEach(clearInterval);
          pre.removeEventListener('mouseover', onMouseOver);
          pre.removeEventListener('mouseleave', onMouseLeave);
        };
      }

      // --- Project link group hover ---
      function initProjectGroupHover(pre) {
        const groupedLinks = pre.querySelectorAll('a[data-project]');
        groupedLinks.forEach((link) => {
          const projectName = link.dataset.project;
          const matchingLinks = pre.querySelectorAll(`a[data-project="${projectName}"]`);
          const setActiveState = (active) => {
            matchingLinks.forEach((ml) => ml.classList.toggle('is-active', active));
          };
          link.addEventListener('mouseenter', () => setActiveState(true));
          link.addEventListener('mouseleave', () => setActiveState(false));
          link.addEventListener('focus', () => setActiveState(true));
          link.addEventListener('blur', () => setActiveState(false));
        });
      }

      initProjectGroupHover(container);

      // --- Main generation ---
      function generateAsciiShape() {
        if (!imageLoaded || templateImage.naturalWidth <= 0 || templateImage.naturalHeight <= 0) {
          renderFallbackLinks();
          return;
        }

        updateContainerSize();
        container.innerHTML = "";
        container.style.overflow = "hidden";

        const { charWidth, charHeight } = getCharacterSize(container);
        const columns = Math.floor(container.clientWidth / charWidth);
        const savedRows = parseInt(container.dataset.asciiRows || "0", 10);
        const rows = savedRows > 0 ? savedRows : Math.floor(container.clientHeight / charHeight);

        if (columns < 20 || rows < 14) {
          renderFallbackLinks();
          return;
        }

        const { grid, rowSegments, leftEdge } = createShape(columns, rows);
        const linkSegments = placeLinks(rowSegments, columns, rows, leftEdge);
        const utilitySegments = placeUtilityLinks(columns, rows);
        const preElement = renderAsciiWithEmbeddedLinks(grid, linkSegments, utilitySegments);
        container.appendChild(preElement);
        initCharacterCycling(preElement);
        initProjectGroupHover(preElement);
      }

      // --- Image loading ---
      templateImage.onload = () => {
        imageLoaded = true;
        updateContainerSize();
        generateAsciiShape();
      };

      templateImage.onerror = () => {
        imageLoaded = false;
        updateContainerSize();
        renderFallbackLinks();
      };

      templateImage.src = "images/shape.png";

      // --- Auto-size container and regenerate on resize ---
      function getAvailableAsciiHeight() {
        const viewportHeight = window.innerHeight || document.documentElement.clientHeight;
        const mainElement = container.closest('main');
        const mainStyle = mainElement ? getComputedStyle(mainElement) : null;
        const bottomPadding = mainStyle ? parseFloat(mainStyle.paddingBottom) || 0 : 0;
        const containerTop = container.getBoundingClientRect().top;
        return Math.max(1, viewportHeight - containerTop - bottomPadding);
      }

      function updateContainerSize() {
        if (!imageLoaded || templateImage.naturalWidth <= 0 || templateImage.naturalHeight <= 0) {
          delete container.dataset.asciiRows;
          delete container.dataset.targetAsciiColumns;
          container.style.height = "auto";
          container.style.maxHeight = "none";
          container.style.overflow = "visible";
          return;
        }

        fitAsciiFontToColumnTarget();

        const style = getComputedStyle(container);
        const fontSize = parseFloat(style.fontSize);
        const lineHeight = parseFloat(style.lineHeight) || fontSize * 1.05;
        const { charWidth, charHeight } = getCharacterSize(container);
        const imageRatio = templateImage.naturalHeight / templateImage.naturalWidth;
        const columns = Math.max(1, container.clientWidth / Math.max(0.1, charWidth));

        // Preserve the source image's visual aspect ratio in rendered character
        // cells. This prevents the ASCII from stretching vertically as the
        // resolution changes.
        const characterAspectCorrection = charWidth / Math.max(0.1, charHeight);
        const idealRows = Math.max(14, Math.round(columns * imageRatio * characterAspectCorrection));
        const availableHeight = getAvailableAsciiHeight();
        const maxRowsOnScreen = Math.max(14, Math.floor(availableHeight / charHeight));
        const fittedRows = Math.min(idealRows, maxRowsOnScreen);
        const fittedHeight = Math.min(availableHeight, fittedRows * charHeight);

        container.dataset.asciiRows = String(fittedRows);
        container.style.height = fittedHeight + 'px';
        container.style.maxHeight = availableHeight + 'px';
        container.style.overflow = "hidden";
      }

      updateContainerSize();
      renderFallbackLinks();

      let resizeFrame = null;
      let lastAsciiLayoutWidth = Math.round(container.getBoundingClientRect().width);
      let lastAsciiViewportWidth = document.documentElement.clientWidth || window.innerWidth || 0;
      let lastAsciiOrientation = window.matchMedia('(max-width: 900px)').matches ? 'mobile' : 'desktop';

      function scheduleAsciiRegeneration(force) {
        cancelAnimationFrame(resizeFrame);

        resizeFrame = requestAnimationFrame(() => {
          const currentLayoutWidth = Math.round(container.getBoundingClientRect().width);
          const currentViewportWidth = document.documentElement.clientWidth || window.innerWidth || 0;
          const currentOrientation = window.matchMedia('(max-width: 900px)').matches ? 'mobile' : 'desktop';
          const widthChanged = Math.abs(currentLayoutWidth - lastAsciiLayoutWidth) > 2 ||
            Math.abs(currentViewportWidth - lastAsciiViewportWidth) > 2;
          const orientationChanged = currentOrientation !== lastAsciiOrientation;

          // Do not regenerate for mobile height-only viewport changes during scroll.
          if (!force && !widthChanged && !orientationChanged) {
            return;
          }

          lastAsciiLayoutWidth = currentLayoutWidth;
          lastAsciiViewportWidth = currentViewportWidth;
          lastAsciiOrientation = currentOrientation;

          updateContainerSize();
          generateAsciiShape();
        });
      }

      window.addEventListener('resize', () => scheduleAsciiRegeneration(false));
      window.addEventListener('orientationchange', () => scheduleAsciiRegeneration(true));

      if (templateImage.complete) {
        if (templateImage.naturalWidth > 0) {
          imageLoaded = true;
          updateContainerSize();
          generateAsciiShape();
        } else {
          imageLoaded = false;
          updateContainerSize();
          renderFallbackLinks();
        }
      } else {
        setTimeout(() => {
          if (!imageLoaded) {
            updateContainerSize();
            renderFallbackLinks();
          }
        }, 500);
      }
    })();
  </script>
</body>
