<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Portfolio</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --background: #ffffff;
            --text: #000000;
            --link: #0000ee;
            --hover-background: #0000ee;
            --hover-text: #ffffff;
            --font: "OCR A Std", "OCR A Extended", "OCR-A", "Letter Gothic Std", "Share Tech Mono", "IBM Plex Mono", "Cascadia Mono", "Andale Mono", "Monaco", "Lucida Console", "DejaVu Sans Mono", "Noto Sans Mono", ui-monospace, monospace;
            --mobile-side-padding: 16px;
            --mobile-ascii-side-padding: 28px;
        }

        html,
        body {
            margin: 6px;
            min-height: 100%;
            background: var(--background);
            color: var(--text);
            font-family: var(--font);
            font-variant-ligatures: none;
            text-rendering: geometricPrecision;
            font-synthesis: none;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            min-height: 100vh;
            overflow-x: auto;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        main {
            min-height: 100vh;
            display: block;
            padding: 48px 32px 48px 310px;
        }

        .site-banner {
            font-family: "Helvetica Neue", "Helvetica", "Arial Narrow", Arial, sans-serif;
            font-size: clamp(24px, 4vw, 56px);
            font-weight: normal;
            letter-spacing: -0.06em;
            line-height: 1;
            margin: 0 0 0 0;
            color: var(--text);

        }
    </style>

<body>

    <p>under construction...</p>

</body>


</html>
